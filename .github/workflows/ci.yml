name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up GHC and cabal
        id: setup
        uses: haskell-actions/setup@v2
        with:
          # Must match the bounds in free-foil-nbe.cabal (base ^>=4.20.2.0)
          # and with-compiler in cabal.project.
          ghc-version: '9.10.3'
          cabal-version: 'latest'

      - name: Update package index
        run: cabal update

      - name: Generate build plan
        run: cabal build all --dry-run

      - name: Cache cabal store and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.setup.outputs.cabal-store }}
            dist-newstyle
          key: ${{ runner.os }}-ghc-${{ steps.setup.outputs.ghc-version }}-${{ hashFiles('**/plan.json') }}
          restore-keys: |
            ${{ runner.os }}-ghc-${{ steps.setup.outputs.ghc-version }}-

      - name: Build dependencies
        run: cabal build all --only-dependencies

      - name: Build
        run: cabal build all

      - name: Test
        run: cabal test all --test-show-details=direct
